on:
  workflow_dispatch:

name: Update snapshots

jobs:
  update-snapshots:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat, any::vdiffr

      - name: Run tests and accept new snapshots
        run: |
          Rscript -e "
            devtools::load_all()
            options(testthat.progress.max_fails = Inf)
            tryCatch(
              testthat::test_package('ggstatsplot'),
              error = function(e) invisible(NULL)
            )
            testthat::snapshot_accept()
          "

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "test: update vdiffr snapshots"
          file_pattern: "tests/testthat/_snaps/**/*.svg"
