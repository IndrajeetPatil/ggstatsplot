on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    uses: IndrajeetPatil/workflows/.github/workflows/R-CMD-check.yaml@consolidate-r-package-workflows
    with:
      error-on: 'ifelse(getRversion() > "4.3", "note", "warning")'
