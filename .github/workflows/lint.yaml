on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Trigger once a week at 00:00 on Sunday
    - cron: "0 0 * * SUN"

name: lint

jobs:
  lint:
    uses: IndrajeetPatil/workflows/.github/workflows/lint.yaml@consolidate-r-package-workflows
